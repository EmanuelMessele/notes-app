name: Deploy to AWS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 858758524543.dkr.ecr.us-east-1.amazonaws.com
  BACKEND_IMAGE: notes-backend
  FRONTEND_IMAGE: notes-frontend

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push backend
        run: |
          docker build -t $ECR_REGISTRY/$BACKEND_IMAGE:latest ./backend
          docker push $ECR_REGISTRY/$BACKEND_IMAGE:latest

      - name: Build and push frontend
        run: |
          docker build \
            --build-arg VITE_API_URL=http://13.222.129.243:3000 \
            -t $ECR_REGISTRY/$FRONTEND_IMAGE:latest \
            ./frontend
          docker push $ECR_REGISTRY/$FRONTEND_IMAGE:latest

      - name: Deploy backend to ECS
        run: |
          aws ecs update-service \
            --cluster notes-app-cluster \
            --service notes-backend-service \
            --force-new-deployment \
            --region $AWS_REGION

      - name: Deploy frontend to ECS
        run: |
          aws ecs update-service \
            --cluster notes-app-cluster \
            --service notes-frontend-service \
            --force-new-deployment \
            --region $AWS_REGION
